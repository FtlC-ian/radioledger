# RadioLedger — Docker Compose for local development and self-hosting
#
# Quick start:
#   cd docker
#   ./init.sh      # generates .env with random secrets (first run only)
#   docker compose build api lotw-vault web docs
#   docker compose up -d --no-build
#   # Visit http://localhost:3000
#
# Auth modes:
#   AUTH_MODE=dev     (default) — local-only quickstart; accepts "dev-user-{id}" tokens.
#   AUTH_MODE=zitadel (public/production) — validates RS256 JWTs against Zitadel.
#                     Set ZITADEL_URL in .env and start the zitadel service.
#
# To expose beyond localhost, first enable production-like auth:
#   docker compose --profile zitadel up -d
#
# Security defaults (per Hawk's audit):
#   - DB port is NOT exposed to the host (internal Docker network only)
#   - API container runs as non-root user with read-only filesystem
#   - No hardcoded passwords — all secrets in .env (generated by init.sh)
#   - RADIOLEDGER_MASTER_KEY required at startup (refuses to start if absent)

name: radioledger

services:
  # ── PostgreSQL + PostGIS ─────────────────────────────────────────────────
  db:
    # Official postgis/postgis images currently publish amd64 manifests only.
    # Apple Silicon/arm64 hosts need Docker emulation enabled or a custom
    # multi-arch PostGIS image supplied via POSTGIS_IMAGE/POSTGIS_PLATFORM.
    image: ${POSTGIS_IMAGE:-postgis/postgis:17-3.5}
    platform: ${POSTGIS_PLATFORM:-linux/amd64}
    restart: unless-stopped
    environment:
      # Required: database superuser credentials (generated by init.sh).
      POSTGRES_USER: ${POSTGRES_USER:-radioledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-radioledger}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # DB port is intentionally NOT exposed to the host.
    # It is only reachable from within the radioledger_net Docker network.
    # To access it directly (dev only), use docker-compose.dev.yml override.
    healthcheck:
      test:
        - CMD
        - pg_isready
        - -U
        - ${POSTGRES_USER:-radioledger}
        - -d
        - ${POSTGRES_DB:-radioledger}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - radioledger_net

  # ── Zitadel Auth Server ──────────────────────────────────────────────────
  # Zitadel provides OIDC/OAuth2 authentication. It is a single Go binary
  # that self-hosts the auth UI, token endpoints, and admin console.
  #
  # Enabled with: docker compose --profile zitadel up -d
  # Once running:
  #   - Auth UI:     http://localhost:8081
  #   - Admin setup: http://localhost:8081/ui/console
  # Set AUTH_MODE=zitadel and ZITADEL_URL=http://zitadel:8080 in .env.
  #
  # For production, replace with a publicly accessible Zitadel instance
  # (self-hosted on a VPS or Zitadel cloud: https://zitadel.com).
  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.71.19
    profiles: [zitadel]
    restart: unless-stopped
    command:
      - start-from-init
      - --masterkey
      - ${ZITADEL_MASTERKEY:-MasterkeyNeedsTo32Characters!!!!}
      - --tlsMode
      - disabled
    environment:
      # Connect Zitadel to the shared PostgreSQL instance.
      # Required: POSTGRES_USER, POSTGRES_PASSWORD (from .env).
      ZITADEL_DATABASE_POSTGRES_HOST: db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${POSTGRES_USER:-radioledger}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${POSTGRES_USER:-radioledger}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # Externally reachable URL for OAuth2 redirects (update for production).
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8081
      ZITADEL_EXTERNALSECURE: "false"
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - radioledger_net

  # ── LoTW Signing Vault ───────────────────────────────────────────────────
  # The vault stores encrypted LoTW private keys and signs ADIF logs on
  # request. It has NO internet access — all uploads to ARRL are handled
  # by the API service.
  # The vault is only reachable by services on the vault-internal network.
  lotw-vault:
    build:
      context: ../lotw-vault
      dockerfile: Dockerfile
    image: radioledger/lotw-vault:0.1.0
    restart: unless-stopped

    # NO exposed ports — vault is only reachable via the vault-internal network.
    ports: []

    volumes:
      - lotw_vault_data:/data

    environment:
      # Required: vault listen address (no TLS; terminated at the API gateway).
      - VAULT_ADDR=:8081

    command: ["-addr", ":8081", "-db", "/data/certs.db"]

    # Security hardening — matches lotw-vault/docker-compose.yml constraints.
    # scratch container: no shell, no package manager.
    # UID 65534 (nobody), read-only filesystem, no capabilities.
    user: "65534:65534"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=10M,uid=65534,gid=65534

    # NOTE: scratch container has no shell/wget/curl, so Docker healthchecks
    # cannot run. The vault exposes GET /health but there's no binary to call it.
    # If you need a health check, switch the base image to alpine and add wget.

    networks:
      - vault-internal

  # ── Go API Server ────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    image: radioledger/api:0.1.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      lotw-vault:
        condition: service_started
    environment:
      # Required: database connection string (user/password from .env).
      DATABASE_URL: >-
        postgres://${POSTGRES_USER:-radioledger}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-radioledger}?sslmode=disable
      # Required: master encryption key for at-rest secrets.
      RADIOLEDGER_MASTER_KEY: ${RADIOLEDGER_MASTER_KEY}
      # Explicit shared mount for async ADIF upload staging.
      RADIOLEDGER_IMPORT_TMPDIR: /tmp/radioledger
      PORT: ${API_PORT:-8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      # Auth — defaults to dev mode for easy local development.
      # Set AUTH_MODE=zitadel and ZITADEL_URL=http://zitadel:8080 for
      # production-like auth testing.
      AUTH_MODE: ${AUTH_MODE:-dev}
      ZITADEL_URL: ${ZITADEL_URL:-}
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-radioledger-api}
      OTEL_EXPORTER: ${OTEL_EXPORTER:-noop}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Optional: comma-separated admin email addresses.
      RADIOLEDGER_ADMIN_EMAILS: ${RADIOLEDGER_ADMIN_EMAILS:-}
      # LoTW vault — reachable only on the internal vault-internal network.
      LOTW_VAULT_URL: ${LOTW_VAULT_URL:-http://lotw-vault:8081}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Security hardening (from Hawk's audit):
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      # Shared tmpfs volume for ADIF import files (API writes, worker reads).
      - import_tmp:/tmp/radioledger
    tmpfs:
      - /tmp:mode=1777,size=64m
    networks:
      - radioledger_net
      - vault-internal

  # ── Background Worker ────────────────────────────────────────────────────
  # Runs the same radioledger/api image in worker mode (--mode=worker).
  # The worker process handles async job processing and exposes Prometheus
  # metrics on port 2112 (scraped by the radioledger-worker Prometheus job).
  #
  # Omit this service if you want the API to handle background work inline
  # (the default when --mode=worker is not set).
  worker:
    image: radioledger/api:0.1.0
    command: ["--mode=worker"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      lotw-vault:
        condition: service_started
    environment:
      # Required: database connection string (user/password from .env).
      DATABASE_URL: >-
        postgres://${POSTGRES_USER:-radioledger}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-radioledger}?sslmode=disable
      # Required: master encryption key for at-rest secrets.
      RADIOLEDGER_MASTER_KEY: ${RADIOLEDGER_MASTER_KEY}
      RADIOLEDGER_IMPORT_TMPDIR: /tmp/radioledger
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      AUTH_MODE: ${AUTH_MODE:-dev}
      ZITADEL_URL: ${ZITADEL_URL:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-radioledger-worker}
      OTEL_EXPORTER: ${OTEL_EXPORTER:-noop}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # LoTW vault — worker calls vault for signing during LoTW sync jobs.
      LOTW_VAULT_URL: ${LOTW_VAULT_URL:-http://lotw-vault:8081}
    # No port binding — worker is not reachable from outside Docker network.
    # Prometheus scrapes metrics internally via worker:2112.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2112/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      # Shared tmpfs volume for ADIF import files (API writes, worker reads).
      - import_tmp:/tmp/radioledger
    tmpfs:
      - /tmp:mode=1777,size=64m
    networks:
      - radioledger_net
      - vault-internal

  # ── Web UI (Quasar SPA served by nginx) ─────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:3000:80"
    # nginx:alpine runs as root briefly to bind port 80, then drops to
    # the nginx user. read_only cannot be set here because nginx needs to
    # write to /var/cache/nginx, /var/run, and /tmp.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    tmpfs:
      - /var/cache/nginx:mode=755
      - /var/run:mode=755
      - /tmp:mode=1777
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - radioledger_net

  # ── Docs Site ────────────────────────────────────────────────────────────
  # VitePress-based static documentation site served by nginx.
  # Accessible at http://localhost:3002 or via /docs proxy on the web container.
  docs:
    build:
      context: ..
      dockerfile: docs/Dockerfile
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:3002:80"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    tmpfs:
      - /var/cache/nginx:mode=755
      - /var/run:mode=755
      - /tmp:mode=1777
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/docs/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - radioledger_net

  # ── PostgreSQL Exporter ──────────────────────────────────────────────────
  # Exports pg_stat_* metrics for Prometheus scraping on port 9187.
  # Internal-only: port is NOT exposed to the host.
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    profiles: [monitoring]
    restart: unless-stopped
    environment:
      # Required: database connection string (user/password from .env).
      DATA_SOURCE_NAME: >-
        postgresql://${POSTGRES_USER:-radioledger}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-radioledger}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - radioledger_net

  # ── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: [monitoring]
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - radioledger_net

  # ── Alertmanager ─────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: [monitoring]
    restart: unless-stopped
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - radioledger_net

  # ── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.2
    profiles: [monitoring]
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:3001:3000"
    environment:
      # Required: Grafana admin credentials (set in .env).
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - radioledger_net

  # ── Jaeger (dev profile) ─────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.61
    profiles: [dev]
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:16686:16686"
      - "${BIND_ADDRESS:-127.0.0.1}:4318:4318"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:16686/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - radioledger_net

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  # Primary PostgreSQL data directory.
  pgdata:
    driver: local
  # Persistent storage for the LoTW vault's encrypted certificate database.
  lotw_vault_data:
    driver: local
  # Shared temp storage for ADIF import files (API writes, worker reads).
  import_tmp:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=512m,mode=1777

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  radioledger_net:
    driver: bridge
  # vault-internal is an air-gapped network for the LoTW signing vault.
  # internal: true means containers on this network cannot reach the internet.
  # Only api and worker services are allowed on this network alongside vault.
  vault-internal:
    driver: bridge
    internal: true
