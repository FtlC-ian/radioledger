global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "radioledger-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: "postgres-exporter"
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "radioledger-worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:2112"]
