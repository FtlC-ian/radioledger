# RadioLedger Web UI — nginx configuration
# Serves the Quasar SPA and proxies /v1/* to the API service.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow ADIF file uploads up to 50MB
    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API proxy — forward /v1/* to the Go API service ───────────────────────
    location /v1/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Reasonable timeouts for API calls
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Health and readiness probes (proxied from API) ─────────────────────────
    location = /health {
        proxy_pass http://api:8080/health;
        proxy_http_version 1.1;
        access_log off;
    }

    location = /ready {
        proxy_pass http://api:8080/ready;
        proxy_http_version 1.1;
        access_log off;
    }

    # ── Docs site — proxy /docs to the VitePress docs container ───────────────
    # ^~ ensures this prefix match wins over the static-asset regex below,
    # so /docs/assets/*.css etc. get proxied instead of 404-ing locally.
    location ^~ /docs/ {
        proxy_pass         http://docs:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Quasar SPA — hash-router mode, all routes served as index.html ─────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Disable access log for noisy favicon requests
    location = /favicon.ico {
        log_not_found off;
        access_log    off;
    }
}
